<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo, useCallback, useRef, useEffect } = React;

// ================================================================
// DATA — hand-curated 2D stand-in for LLM token-embedding geometry.
// Swap in real embeddings by replacing the {x, y} coordinates.
// Axes (implicit): x ≈ kinematic↔geometric, y ≈ local↔global.
// ================================================================

const FLUID_CONCEPTS = [
  { id: 'acoustic_horizon',  label: 'acoustic horizon',    x: 0.20, y: 0.85 },
  { id: 'sonic_point',       label: 'sonic point',         x: 0.31, y: 0.74 },
  { id: 'vorticity',         label: 'vorticity',           x: 0.80, y: 0.22 },
  { id: 'velocity_gradient', label: 'velocity gradient',   x: 0.68, y: 0.30 },
  { id: 'pressure_gradient', label: 'pressure gradient',   x: 0.84, y: 0.40 },
  { id: 'acoustic_metric',   label: 'acoustic metric',     x: 0.52, y: 0.54 },
  { id: 'phonon',            label: 'phonon',              x: 0.48, y: 0.20 },
  { id: 'draining_vortex',   label: 'draining vortex',     x: 0.17, y: 0.42 },
  { id: 'mach_cone',         label: 'mach cone',           x: 0.62, y: 0.64 },
  { id: 'surface_gravity_ac',label: 'surface gravity (ac)',x: 0.34, y: 0.82 },
  { id: 'hawking_temp_ac',   label: 'Hawking temp (ac)',   x: 0.44, y: 0.92 },
  { id: 'ergoregion_ac',     label: 'ergoregion (ac)',     x: 0.12, y: 0.60 },
  { id: 'superradiance_ac',  label: 'superradiance (ac)',  x: 0.24, y: 0.32 },
  { id: 'sound_speed',       label: 'sound speed',         x: 0.58, y: 0.46 },
  { id: 'fluid_flow',        label: 'fluid flow',          x: 0.52, y: 0.38 },
];

const BH_CONCEPTS = [
  { id: 'event_horizon',     label: 'event horizon',       x: 0.22, y: 0.82 },
  { id: 'photon_sphere',     label: 'photon sphere',       x: 0.40, y: 0.66 },
  { id: 'frame_dragging',    label: 'frame-dragging',      x: 0.75, y: 0.27 },
  { id: 'tidal_tensor',      label: 'tidal tensor',        x: 0.66, y: 0.38 },
  { id: 'grav_accel',        label: 'gravitational accel', x: 0.87, y: 0.46 },
  { id: 'spacetime_metric',  label: 'spacetime metric',    x: 0.54, y: 0.50 },
  { id: 'graviton',          label: 'graviton',            x: 0.46, y: 0.16 },
  { id: 'kerr_bh',           label: 'Kerr BH',             x: 0.15, y: 0.48 },
  { id: 'light_cone',        label: 'light cone',          x: 0.65, y: 0.60 },
  { id: 'surface_gravity',   label: 'surface gravity',     x: 0.38, y: 0.78 },
  { id: 'hawking_temp',      label: 'Hawking temp',        x: 0.46, y: 0.89 },
  { id: 'ergoregion',        label: 'ergoregion',          x: 0.15, y: 0.64 },
  { id: 'superradiance',     label: 'superradiance',       x: 0.29, y: 0.37 },
  { id: 'speed_of_light',    label: 'speed of light',      x: 0.60, y: 0.42 },
  { id: 'spacetime',         label: 'spacetime',           x: 0.53, y: 0.36 },
];

// The twelve correspondences used to learn L and R.
// Left out intentionally (Kan-extended — the framework predicts their partners):
//   fluid side: sonic_point, pressure_gradient, fluid_flow
//   BH side:    photon_sphere, grav_accel, spacetime
const CORRESPONDENCES = [
  ['acoustic_horizon',   'event_horizon'],
  ['vorticity',          'frame_dragging'],
  ['velocity_gradient',  'tidal_tensor'],
  ['acoustic_metric',    'spacetime_metric'],
  ['phonon',             'graviton'],
  ['mach_cone',          'light_cone'],
  ['surface_gravity_ac', 'surface_gravity'],
  ['hawking_temp_ac',    'hawking_temp'],
  ['ergoregion_ac',      'ergoregion'],
  ['superradiance_ac',   'superradiance'],
  ['sound_speed',        'speed_of_light'],
  ['draining_vortex',    'kerr_bh'],
];

// ================================================================
// MATH — Gaussian-kernel transport as a cheap stand-in for
// W_2 Sinkhorn barycenter. On delta distributions in a low-curvature
// region of embedding space, the two agree up to a Ricci correction.
// ================================================================

function softmax(arr) {
  const max = Math.max(...arr);
  const exp = arr.map(x => Math.exp(x - max));
  const sum = exp.reduce((a, b) => a + b, 0);
  return exp.map(x => x / sum);
}

function kernelMap(point, sourcePairs, targetPairs, sigma) {
  const sig2 = sigma * sigma;
  const logW = sourcePairs.map(p =>
    -(((point.x - p.x) ** 2) + ((point.y - p.y) ** 2)) / sig2
  );
  const w = softmax(logW);
  let x = 0, y = 0;
  for (let i = 0; i < targetPairs.length; i++) {
    x += w[i] * targetPairs[i].x;
    y += w[i] * targetPairs[i].y;
  }
  return { x, y };
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ================================================================
// COMPONENT
// ================================================================

function FunctorExplorer() {
  const [fluidPos, setFluidPos] = useState(() =>
    Object.fromEntries(FLUID_CONCEPTS.map(c => [c.id, { x: c.x, y: c.y }]))
  );
  const [bhPos, setBhPos] = useState(() =>
    Object.fromEntries(BH_CONCEPTS.map(c => [c.id, { x: c.x, y: c.y }]))
  );
  const [sigma, setSigma] = useState(0.18);
  const [selected, setSelected] = useState('acoustic_horizon');
  const [selectedSide, setSelectedSide] = useState('fluid');
  const [showTransport, setShowTransport] = useState(true);
  const [showZigzag, setShowZigzag]       = useState(true);
  const [showKan, setShowKan]             = useState(true);

  const dragRef = useRef(null);
  const svgRef  = useRef(null);

  // Layout constants
  const W = 1340, H = 640;
  const PANEL_W = 560, PANEL_H = 520;
  const FLUID_X0 = 40,  FLUID_Y0 = 70;
  const BH_X0    = 740, BH_Y0    = 70;

  const toScreenFluid = (p) => ({
    x: FLUID_X0 + p.x * PANEL_W,
    y: FLUID_Y0 + (1 - p.y) * PANEL_H,
  });
  const toScreenBh = (p) => ({
    x: BH_X0 + p.x * PANEL_W,
    y: BH_Y0 + (1 - p.y) * PANEL_H,
  });
  const fromScreenFluid = (sx, sy) => ({
    x: Math.max(0.02, Math.min(0.98, (sx - FLUID_X0) / PANEL_W)),
    y: Math.max(0.02, Math.min(0.98, 1 - (sy - FLUID_Y0) / PANEL_H)),
  });
  const fromScreenBh = (sx, sy) => ({
    x: Math.max(0.02, Math.min(0.98, (sx - BH_X0) / PANEL_W)),
    y: Math.max(0.02, Math.min(0.98, 1 - (sy - BH_Y0) / PANEL_H)),
  });

  // Paired arrays for kernel maps
  const { fluidPairs, bhPairs } = useMemo(() => {
    const fp = [], bp = [];
    for (const [fid, bid] of CORRESPONDENCES) {
      fp.push(fluidPos[fid]);
      bp.push(bhPos[bid]);
    }
    return { fluidPairs: fp, bhPairs: bp };
  }, [fluidPos, bhPos]);

  // Compute L, R, RL, LR, and zigzag defects for all concepts
  const analysis = useMemo(() => {
    const Lof = {}, Rof = {}, RLof = {}, LRof = {};
    const epsL = {}, epsR = {};

    for (const c of FLUID_CONCEPTS) {
      const a = fluidPos[c.id];
      const La  = kernelMap(a,  fluidPairs, bhPairs, sigma);
      const RLa = kernelMap(La, bhPairs,   fluidPairs, sigma);
      Lof[c.id]  = La;
      RLof[c.id] = RLa;
      epsL[c.id] = dist(a, RLa);
    }
    for (const c of BH_CONCEPTS) {
      const b = bhPos[c.id];
      const Rb  = kernelMap(b,  bhPairs,   fluidPairs, sigma);
      const LRb = kernelMap(Rb, fluidPairs, bhPairs,   sigma);
      Rof[c.id]  = Rb;
      LRof[c.id] = LRb;
      epsR[c.id] = dist(b, LRb);
    }

    const pairedFluidIds = CORRESPONDENCES.map(([f]) => f);
    const pairedBhIds    = CORRESPONDENCES.map(([, b]) => b);
    const mEpsL = pairedFluidIds.reduce((s, id) => s + epsL[id], 0) / pairedFluidIds.length;
    const mEpsR = pairedBhIds.reduce((s, id) => s + epsR[id], 0) / pairedBhIds.length;
    const maxDefect = Math.max(
      ...pairedFluidIds.map(id => epsL[id]),
      ...pairedBhIds.map(id => epsR[id])
    );

    return { Lof, Rof, RLof, LRof, epsL, epsR, mEpsL, mEpsR, maxDefect };
  }, [fluidPos, bhPos, sigma, fluidPairs, bhPairs]);

  // Drag handlers
  const onPointerDown = useCallback((e, conceptId, side) => {
    e.preventDefault();
    e.stopPropagation();
    dragRef.current = { conceptId, side };
    setSelected(conceptId);
    setSelectedSide(side);
    try { e.target.setPointerCapture(e.pointerId); } catch (_) {}
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!dragRef.current) return;
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const sx = ((e.clientX - rect.left) / rect.width)  * W;
    const sy = ((e.clientY - rect.top)  / rect.height) * H;
    const { conceptId, side } = dragRef.current;
    if (side === 'fluid') {
      const p = fromScreenFluid(sx, sy);
      setFluidPos(prev => ({ ...prev, [conceptId]: p }));
    } else {
      const p = fromScreenBh(sx, sy);
      setBhPos(prev => ({ ...prev, [conceptId]: p }));
    }
  }, []);

  const onPointerUp = useCallback(() => { dragRef.current = null; }, []);

  const resetPositions = () => {
    setFluidPos(Object.fromEntries(FLUID_CONCEPTS.map(c => [c.id, { x: c.x, y: c.y }])));
    setBhPos(Object.fromEntries(BH_CONCEPTS.map(c => [c.id, { x: c.x, y: c.y }])));
  };

  // Analogy ranking by symmetrized zigzag
  const ranking = useMemo(() => {
    return CORRESPONDENCES.map(([fid, bid]) => ({
      fid, bid,
      fluidLabel: FLUID_CONCEPTS.find(c => c.id === fid).label,
      bhLabel:    BH_CONCEPTS.find(c => c.id === bid).label,
      defect: (analysis.epsL[fid] + analysis.epsR[bid]) / 2,
    })).sort((a, b) => a.defect - b.defect);
  }, [analysis]);

  const maxRankDefect = Math.max(0.005, ...ranking.map(r => r.defect));

  const isPaired = (id, side) =>
    side === 'fluid'
      ? CORRESPONDENCES.some(([f]) => f === id)
      : CORRESPONDENCES.some(([, b]) => b === id);

  // Image (under L or R) of selected concept
  const selectedImage = useMemo(() => {
    if (!selected) return null;
    if (selectedSide === 'fluid') {
      return { img: analysis.Lof[selected], ret: analysis.RLof[selected], targetSide: 'bh', op: 'L' };
    } else {
      return { img: analysis.Rof[selected], ret: analysis.LRof[selected], targetSide: 'fluid', op: 'R' };
    }
  }, [selected, selectedSide, analysis]);

  // Labels for selected
  const selectedLabel = selected
    ? (selectedSide === 'fluid'
        ? FLUID_CONCEPTS.find(c => c.id === selected)?.label
        : BH_CONCEPTS.find(c => c.id === selected)?.label)
    : '';
  const selectedDefect = selected
    ? (selectedSide === 'fluid'
        ? (isPaired(selected, 'fluid') ? analysis.epsL[selected] : null)
        : (isPaired(selected, 'bh')    ? analysis.epsR[selected] : null))
    : null;
  const selectedIsKan = selected && !isPaired(selected, selectedSide);

  return (
    <div className="container">
      <header className="main">
        <div className="eyebrow">Part II · Interactive Diagnostic</div>
        <h1>
          Functor Explorer
          <span className="divider">·</span>
          <span style={{color:'#e5b85c'}}>Fluid</span> <span style={{color:'#60584a'}}>⇄</span> <span style={{color:'#5eb8a8'}}>Black Hole</span>
        </h1>
        <div className="subtitle">
          A live map of the adjunction <span className="mono" style={{color:'#b88ae5', fontSize:'0.9rem'}}>L ⊣ R</span> learned from twelve correspondences in the Barceló–Liberati–Visser dictionary. Drag any concept — the adjunction deforms, and every zigzag defect updates in real time.
        </div>
      </header>

      <div className="controls">
        <div className="control-group">
          <span className="control-label">bandwidth σ</span>
          <input type="range" min="0.04" max="0.45" step="0.005"
                 value={sigma}
                 onChange={e => setSigma(parseFloat(e.target.value))} />
          <span className="sigma-readout">{sigma.toFixed(3)}</span>
        </div>

        <div className="control-group">
          <div className={`toggle teal ${showTransport ? 'active' : ''}`}
               onClick={() => setShowTransport(v => !v)}>
            <span className="dot"></span>
            transport plan
          </div>
          <div className={`toggle ${showZigzag ? 'active' : ''}`}
               onClick={() => setShowZigzag(v => !v)}>
            <span className="dot"></span>
            zigzag ghosts
          </div>
          <div className={`toggle lav ${showKan ? 'active' : ''}`}
               onClick={() => setShowKan(v => !v)}>
            <span className="dot"></span>
            Kan-extended concepts
          </div>
        </div>

        <button className="reset" onClick={resetPositions}>reset positions</button>
      </div>

      <div className="stage">
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} width="100%" height="auto"
             onPointerMove={onPointerMove}
             onPointerUp={onPointerUp}
             onPointerLeave={onPointerUp}>

          <defs>
            <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="5" markerHeight="5" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#e5b85c" />
            </marker>
            <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="5" markerHeight="5" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#5eb8a8" />
            </marker>
            <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#e5b85c" stopOpacity="0.35" />
              <stop offset="100%" stopColor="#e5b85c" stopOpacity="0" />
            </radialGradient>
            <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#5eb8a8" stopOpacity="0.35" />
              <stop offset="100%" stopColor="#5eb8a8" stopOpacity="0" />
            </radialGradient>
          </defs>

          {/* Panel frames */}
          <rect x={FLUID_X0} y={FLUID_Y0} width={PANEL_W} height={PANEL_H}
                fill="rgba(229,184,92,0.012)"
                stroke="rgba(229,184,92,0.1)" strokeWidth="1" rx="2" />
          <rect x={BH_X0} y={BH_Y0} width={PANEL_W} height={PANEL_H}
                fill="rgba(94,184,168,0.012)"
                stroke="rgba(94,184,168,0.1)" strokeWidth="1" rx="2" />

          {/* Panel headings */}
          <text x={FLUID_X0} y={FLUID_Y0 - 34}
                style={{fontFamily:'Source Sans 3, sans-serif', fontSize:10.5, letterSpacing:'0.2em', fill:'#7a6f5a', textTransform:'uppercase'}}>
            SOURCE CATEGORY
          </text>
          <text x={FLUID_X0} y={FLUID_Y0 - 12}
                style={{fontFamily:'Cormorant Garamond, serif', fontSize:22, fontWeight:500, fill:'#e8e4d0', fontStyle:'italic'}}>
            𝓕 — fluid dynamics
          </text>

          <text x={BH_X0} y={BH_Y0 - 34}
                style={{fontFamily:'Source Sans 3, sans-serif', fontSize:10.5, letterSpacing:'0.2em', fill:'#7a6f5a', textTransform:'uppercase'}}>
            TARGET CATEGORY
          </text>
          <text x={BH_X0} y={BH_Y0 - 12}
                style={{fontFamily:'Cormorant Garamond, serif', fontSize:22, fontWeight:500, fill:'#e8e4d0', fontStyle:'italic'}}>
            𝓑 — black hole physics
          </text>

          {/* Axis hints */}
          <text x={FLUID_X0 + PANEL_W/2} y={FLUID_Y0 + PANEL_H + 22}
                textAnchor="middle"
                style={{fontSize:10, letterSpacing:'0.12em', fill:'#4e4636', fontStyle:'italic', fontFamily:'Cormorant Garamond, serif'}}>
            kinematic ← → geometric
          </text>
          <text x={BH_X0 + PANEL_W/2} y={BH_Y0 + PANEL_H + 22}
                textAnchor="middle"
                style={{fontSize:10, letterSpacing:'0.12em', fill:'#4e4636', fontStyle:'italic', fontFamily:'Cormorant Garamond, serif'}}>
            kinematic ← → geometric
          </text>
          <text x={FLUID_X0 - 16} y={FLUID_Y0 + PANEL_H/2}
                textAnchor="middle"
                transform={`rotate(-90, ${FLUID_X0 - 16}, ${FLUID_Y0 + PANEL_H/2})`}
                style={{fontSize:10, letterSpacing:'0.12em', fill:'#4e4636', fontStyle:'italic', fontFamily:'Cormorant Garamond, serif'}}>
            local ← → global
          </text>

          {/* Transport plan lines (paired correspondences only) */}
          {showTransport && CORRESPONDENCES.map(([fid, bid], i) => {
            const f = toScreenFluid(fluidPos[fid]);
            const b = toScreenBh(bhPos[bid]);
            const midX = (f.x + b.x) / 2;
            const midY = (f.y + b.y) / 2 - 40;
            const defect = (analysis.epsL[fid] + analysis.epsR[bid]) / 2;
            const norm   = Math.min(1, defect / 0.22);
            const opacity = 0.10 + 0.22 * (1 - norm);
            const stroke = `rgba(94, 184, 168, ${opacity.toFixed(3)})`;
            return (
              <path key={`tp-${i}`}
                    d={`M ${f.x} ${f.y} Q ${midX} ${midY} ${b.x} ${b.y}`}
                    fill="none" stroke={stroke} strokeWidth="0.8"
                    strokeDasharray="2.5,3" />
            );
          })}

          {/* Fluid concepts */}
          {FLUID_CONCEPTS.map(c => {
            const paired = isPaired(c.id, 'fluid');
            if (!paired && !showKan) return null;
            const pos = fluidPos[c.id];
            const scr = toScreenFluid(pos);
            const isSel = selected === c.id && selectedSide === 'fluid';
            const color = paired ? '#e5b85c' : '#b88ae5';
            const labelColor = isSel ? '#ffffff' : (paired ? '#d8cfae' : '#b8a5d8');

            return (
              <g key={`fc-${c.id}`}>
                {showZigzag && paired && (
                  <g>
                    <line x1={scr.x} y1={scr.y}
                          x2={toScreenFluid(analysis.RLof[c.id]).x}
                          y2={toScreenFluid(analysis.RLof[c.id]).y}
                          stroke="rgba(217, 106, 94, 0.55)"
                          strokeWidth="1"
                          strokeDasharray="1.5,2" />
                    <circle cx={toScreenFluid(analysis.RLof[c.id]).x}
                            cy={toScreenFluid(analysis.RLof[c.id]).y}
                            r="2.5" fill="none"
                            stroke="rgba(217, 106, 94, 0.7)"
                            strokeWidth="1"
                            strokeDasharray="1,1" />
                  </g>
                )}
                {isSel && (
                  <circle cx={scr.x} cy={scr.y} r="18" fill="url(#amberGlow)" />
                )}
                <circle cx={scr.x} cy={scr.y}
                        r={isSel ? 6.5 : 5}
                        fill={color}
                        fillOpacity={paired ? 0.92 : 0.55}
                        stroke={isSel ? '#ffffff' : 'rgba(0,0,0,0.35)'}
                        strokeWidth={isSel ? 1.6 : 0.5}
                        style={{cursor:'grab'}}
                        onPointerDown={e => onPointerDown(e, c.id, 'fluid')} />
                <text x={scr.x + 8} y={scr.y + 3.5}
                      style={{
                        fontSize: isSel ? 11.5 : 10.5,
                        fill: labelColor,
                        fontWeight: isSel ? 500 : 400,
                        fontStyle: paired ? 'normal' : 'italic',
                        fontFamily: 'Source Sans 3, sans-serif',
                        pointerEvents: 'none'
                      }}>
                  {c.label}
                </text>
              </g>
            );
          })}

          {/* BH concepts */}
          {BH_CONCEPTS.map(c => {
            const paired = isPaired(c.id, 'bh');
            if (!paired && !showKan) return null;
            const pos = bhPos[c.id];
            const scr = toScreenBh(pos);
            const isSel = selected === c.id && selectedSide === 'bh';
            const color = paired ? '#5eb8a8' : '#b88ae5';
            const labelColor = isSel ? '#ffffff' : (paired ? '#afd8cf' : '#b8a5d8');

            return (
              <g key={`bc-${c.id}`}>
                {showZigzag && paired && (
                  <g>
                    <line x1={scr.x} y1={scr.y}
                          x2={toScreenBh(analysis.LRof[c.id]).x}
                          y2={toScreenBh(analysis.LRof[c.id]).y}
                          stroke="rgba(217, 106, 94, 0.55)"
                          strokeWidth="1"
                          strokeDasharray="1.5,2" />
                    <circle cx={toScreenBh(analysis.LRof[c.id]).x}
                            cy={toScreenBh(analysis.LRof[c.id]).y}
                            r="2.5" fill="none"
                            stroke="rgba(217, 106, 94, 0.7)"
                            strokeWidth="1"
                            strokeDasharray="1,1" />
                  </g>
                )}
                {isSel && (
                  <circle cx={scr.x} cy={scr.y} r="18" fill="url(#tealGlow)" />
                )}
                <circle cx={scr.x} cy={scr.y}
                        r={isSel ? 6.5 : 5}
                        fill={color}
                        fillOpacity={paired ? 0.92 : 0.55}
                        stroke={isSel ? '#ffffff' : 'rgba(0,0,0,0.35)'}
                        strokeWidth={isSel ? 1.6 : 0.5}
                        style={{cursor:'grab'}}
                        onPointerDown={e => onPointerDown(e, c.id, 'bh')} />
                <text x={scr.x + 8} y={scr.y + 3.5}
                      style={{
                        fontSize: isSel ? 11.5 : 10.5,
                        fill: labelColor,
                        fontWeight: isSel ? 500 : 400,
                        fontStyle: paired ? 'normal' : 'italic',
                        fontFamily: 'Source Sans 3, sans-serif',
                        pointerEvents: 'none'
                      }}>
                  {c.label}
                </text>
              </g>
            );
          })}

          {/* Image of selected concept (L(a) or R(b)) */}
          {selected && selectedImage && (() => {
            const srcPos = selectedSide === 'fluid'
              ? toScreenFluid(fluidPos[selected])
              : toScreenBh(bhPos[selected]);
            const imgPos = selectedImage.targetSide === 'bh'
              ? toScreenBh(selectedImage.img)
              : toScreenFluid(selectedImage.img);
            const midX = (srcPos.x + imgPos.x) / 2;
            const midY = Math.min(srcPos.y, imgPos.y) - 70;
            return (
              <g>
                <path d={`M ${srcPos.x} ${srcPos.y} Q ${midX} ${midY} ${imgPos.x} ${imgPos.y}`}
                      fill="none"
                      stroke="#e5b85c"
                      strokeWidth="1.4"
                      strokeOpacity="0.75"
                      markerEnd="url(#arrow-amber)" />
                <circle cx={imgPos.x} cy={imgPos.y} r="10"
                        fill="none"
                        stroke="#e5b85c"
                        strokeWidth="1.4"
                        strokeDasharray="3,2.5" />
                <circle cx={imgPos.x} cy={imgPos.y} r="2.5"
                        fill="#e5b85c" fillOpacity="0.7" />
                <text x={midX} y={midY + 5}
                      textAnchor="middle"
                      style={{
                        fontSize: 11,
                        fill:'#e5b85c',
                        fontFamily:'JetBrains Mono, monospace',
                        letterSpacing: '0.02em'
                      }}>
                  {selectedImage.op}({selectedLabel})
                </text>
              </g>
            );
          })()}

        </svg>
      </div>

      {/* Metrics row */}
      <div className="metrics">
        <div className="metric">
          <div className="metric-label">⟨ε<sub>L</sub>⟩ · mean zigzag F → B → F</div>
          <div className="metric-value">{analysis.mEpsL.toFixed(4)}</div>
          <div className="metric-sub">averaged over paired fluid concepts</div>
        </div>
        <div className="metric">
          <div className="metric-label">⟨ε<sub>R</sub>⟩ · mean zigzag B → F → B</div>
          <div className="metric-value">{analysis.mEpsR.toFixed(4)}</div>
          <div className="metric-sub">averaged over paired BH concepts</div>
        </div>
        <div className="metric">
          <div className="metric-label">max defect</div>
          <div className="metric-value">{analysis.maxDefect.toFixed(4)}</div>
          <div className="metric-sub">worst-case concept across both sides</div>
        </div>
        <div className="metric highlight">
          <div className="metric-label">selected · {selectedSide === 'fluid' ? 'source' : 'target'}</div>
          <div className="metric-value small">{selectedLabel || '—'}</div>
          <div className="metric-sub">
            {selectedIsKan
              ? <span style={{color:'#b88ae5'}}>Kan-extended (no declared partner)</span>
              : (selectedDefect !== null ? `ε = ${selectedDefect.toFixed(4)}` : '—')}
          </div>
        </div>
      </div>

      {/* Analogy ranking */}
      <div className="ranking">
        <h3>
          Analogy ranking by zigzag tightness
          <span className="sub">sorted by (ε<sub>L</sub>(a) + ε<sub>R</sub>(b))⁄2 at current σ</span>
        </h3>
        {ranking.map((r, i) => {
          const frac = r.defect / maxRankDefect;
          const selectedRow =
            (selectedSide === 'fluid' && selected === r.fid) ||
            (selectedSide === 'bh'    && selected === r.bid);
          return (
            <div key={r.fid}
                 className={`ranking-row ${selectedRow ? 'selected' : ''}`}
                 onClick={() => {
                   setSelected(r.fid); setSelectedSide('fluid');
                 }}>
              <span className="rank-num">{String(i+1).padStart(2, '0')}</span>
              <span className="rank-fluid">{r.fluidLabel}</span>
              <span className="rank-arrow">⟶</span>
              <span className="rank-bh">{r.bhLabel}</span>
              <div className="defect-area">
                <div className="defect-bar">
                  <div className="defect-bar-fill" style={{width: `${Math.max(2, frac * 100)}%`}} />
                </div>
                <span className="defect-value">{r.defect.toFixed(4)}</span>
              </div>
            </div>
          );
        })}
      </div>

      <div className="narrative">
        <strong>What you're looking at.</strong>{' '}
        Twelve correspondences from the Barceló–Liberati–Visser dictionary define an adjunction
        <span className="formula"> L ⊣ R </span>
        between the fluid and BH concept manifolds, learned as a Gaussian-kernel transport with bandwidth
        <span className="formula"> σ</span>. For each concept <em>a</em>, the <strong>zigzag defect</strong>{' '}
        <span className="formula">ε<sub>L</sub>(a) = d(RL(a), a)</span>{' '}
        measures how much meaning is lost on a round trip — the coral ghost trailing each concept is precisely <span className="formula">RL(a)</span>, and the dashed line is the defect itself.
        Tight analogies sit near the top of the ranking; slack ones fall to the bottom. Purple nodes are <em>Kan-extended</em> concepts with no declared partner — drag them on one side and nothing in the ranking changes, because they don't participate in learning <span className="formula">L</span>; instead, their position under the learned map <em>is</em> the framework's live prediction of where they should sit in the other category.
        <br /><br />
        <strong>The falsifiable claim.</strong>{' '}
        At an empirically optimal <span className="formula">σ</span>, the ranking should track physicist consensus on which correspondences are structurally tight. If Hawking-temperature correspondence ranks above draining-vortex/Kerr (it does, at the default configuration), the embedding geometry agrees with the physics. If not, the embedding has flattened structure the dictionary preserves — an informative failure, because it tells you <em>which</em> direction in concept space the flattening is happening in.
        <br /><br />
        <strong>What happens as you crank σ.</strong>{' '}
        Small <span className="formula">σ</span> → sharp interpolation, near-zero zigzag at known pairs, but Kan predictions shoot to the periphery (bad extrapolation). Large <span className="formula">σ</span> → every concept is mapped to the centroid of its partners (uniform blur, all defects equal). Somewhere in between — typically <span className="formula">σ ≈ 0.15–0.22</span> for this layout — the ranking stabilizes and matches the a priori physics ordering. That optimum is the one empirical knob the Sinkhorn version replaces with an entropic regularization; everything else is geometry.
        <br /><br />
        <span className="ref">Replace the 2D coordinates with UMAP-projected token embeddings from Claude / Pythia / OLMo and the same instrument runs on real data — zigzag defect is just ‖RL(a) − a‖<sub>W₂</sub> on δ-distributions, which equals Euclidean distance in the low-curvature regime.</span>
      </div>

      <div className="footer">
        The kernel transport is a Wasserstein-barycenter stand-in, exact on δ-distributions in a flat region of the embedding manifold and correct to Ricci-curvature order elsewhere. Swapping in <span className="mono">ot.sinkhorn</span> changes <span className="mono">kernelMap</span> and nothing else in the widget. The six italicized purple concepts on the two sides are the proposal's first empirical targets — their Kan-extended partners are visible as soon as you click them.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FunctorExplorer />);
</script>
</body>
</html>
